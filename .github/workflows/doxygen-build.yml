name: Build and Deploy Doxygen Documentation

on: [workflow_call, pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build the dockerfile
        run: |
          docker build --build-arg user_id=$(id -u) -f docker/Dockerfile.docs -t docs .

      - name: Run the build.py inside the docker container
        run: |
          docker run --rm -v "$PWD:/home/jenkins" -w /home/jenkins --user $(id -u):4996 docs bash -c "
          python3 .ci/doxygen-docs.py &&
          mv doc/doxygenOut/html doxygen_docs &&
          zip -r doxygen_docs.zip doxygen_docs
          "
      
      - name: Upload doxygen_docs
        uses: actions/upload-artifact@v4
        with:
          name: doxygen_docs
          path: ./doc/doxygen_docs.zip
