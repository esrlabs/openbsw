name: IWYU Analysis

on: [push, pull_request]

jobs:
  iwyu-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Register problem matcher
        run: echo "::add-matcher::./.github/problem-matcher.json"

      - name: Pull and run IWYU in Docker
        run: |
          docker pull ubuntu:22.04
          docker run --rm -v $(pwd):/workspace -w /workspace ubuntu:22.04 bash -c "
            apt-get update &&
            apt-get install -y wget software-properties-common &&

            wget https://apt.llvm.org/llvm.sh &&
            chmod +x llvm.sh &&
            ./llvm.sh 17 &&
            rm llvm.sh &&
            apt-get install -y clang-17 clang++-17 python3 python3-pip cmake build-essential &&

            wget https://github.com/Kitware/CMake/releases/download/v3.22.5/cmake-3.22.5-linux-x86_64.tar.gz && \
            tar -xzf cmake-3.22.5-linux-x86_64.tar.gz -C /usr/local --strip-components=1 && \
            rm cmake-3.22.5-linux-x86_64.tar.gz &&

            apt-get install -y iwyu &&

            # Build Posix target
            rm -rf cmake-build-posix &&
            cmake -B cmake-build-posix -S executables/referenceApp \
                  -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                  -DCMAKE_CXX_FLAGS='-isystem /usr/lib/llvm-17/lib/clang/17/include/' &&
            
            ./iwyu_tool.py -p cmake-build-posix | tee ./.github/iwyu_output_posix.txt || true

            # Build unitTest target
            rm -rf cmake-build-unit-tests &&
            cmake -B cmake-build-unit-tests -S executables/unitTest \
                  -DBUILD_UNIT_TESTS=ON \
                  -DCMAKE_BUILD_TYPE=Debug \
                  -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                  -DCMAKE_CXX_FLAGS='-isystem /usr/lib/llvm-17/lib/clang/17/include/' &&
            
            ./iwyu_tool.py -p cmake-build-unit-tests | tee ./.github/iwyu_output_unit_tests.txt || true
          "

      - name: Unregister problem matcher
        if: always()
        run: echo "::remove-matcher owner=iwyu-matcher::"

      - name: Upload IWYU Output (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: iwyu-results
          path: |
            ./.github/iwyu_output_posix.txt
            ./.github/iwyu_output_unit_tests.txt
