
[socketcan]
channel = "can0"

[serial]
port = "/dev/ttyACM0"
baudrate = 115200
write_byte_delay = 0.01
send_command_expected = "Console command succeeded"
send_command_timeout = 0.1
send_command_max_retries = 2

[eth]
ip_address = "192.168.0.200"

[refApp_freertos.per_run_process]
command_line = "arm-none-eabi-gdb -batch -x flash.gdb ../../build/s32k148-freertos-gcc/executables/referenceApp/application/RelWithDebInfo/app.referenceApp.elf > /dev/null 2>&1"
test_set = "testconfig/refApp_tests.toml"
wait_for_exit = true

[refApp_freertos.target_process]
command_line = "arm-none-eabi-gdb -batch -x reset.gdb ../../build/s32k148-freertos-gcc/executables/referenceApp/application/RelWithDebInfo/app.referenceApp.elf > /dev/null 2>&1"
wait_for_exit = true

[refApp_threadx.per_run_process]
command_line = "arm-none-eabi-gdb -batch -x flash.gdb ../../build/s32k148-threadx-gcc/executables/referenceApp/application/RelWithDebInfo/app.referenceApp.elf > /dev/null 2>&1"
test_set = "testconfig/refApp_tests.toml"
wait_for_exit = true
skip_first = true

[refApp_threadx.target_process]
command_line = "arm-none-eabi-gdb -batch -x reset.gdb ../../build/s32k148-threadx-gcc/executables/referenceApp/application/RelWithDebInfo/app.referenceApp.elf > /dev/null 2>&1"
wait_for_exit = true
skip_first = true

[refApp.boot]
started_str = "INFO: Run level 1"
complete_str = "DEBUG: Run level 9 done"
max_time = 1.5

